*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif}
body{background:#111;color:#f0f0f0;min-height:100vh}
.header{background:#0e0e0e;padding:14px 24px;display:flex;align-items:center;gap:16px;border-bottom:2px solid #E8390E}
.logo{height:36px;object-fit:contain}
.header-sub{font-size:13px;color:#777;font-weight:500;margin-left:4px;padding-left:16px;border-left:1px solid #333}
.container{max-width:860px;margin:0 auto;padding:28px 16px}
h2{font-size:11px;font-weight:700;color:#E8390E;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:600px){.form-row{grid-template-columns:1fr}}
label{display:block;font-size:11px;color:#888;margin-bottom:5px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase}
input,select,textarea{width:100%;background:#1a1a1a;border:1px solid #2e2e2e;color:#f0f0f0;border-radius:8px;padding:11px 14px;font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:#E8390E}
select option{background:#1a1a1a}
.date-row{margin-bottom:20px}
.slot-section{margin-top:4px}
.trainer-block{margin-bottom:20px}
.trainer-name{font-size:12px;font-weight:700;color:#bbb;margin-bottom:8px;display:flex;align-items:center;gap:8px;letter-spacing:0.5px}
.trainer-badge{background:#E8390E;color:#fff;font-size:9px;font-weight:800;padding:2px 7px;border-radius:99px;letter-spacing:0.5px}
.slots-grid{display:flex;flex-wrap:wrap;gap:7px}
.slot{padding:7px 12px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid #2a2a2a;background:#191919;color:#aaa;transition:all .12s;user-select:none}
.slot:hover:not(.booked){border-color:#E8390E;color:#E8390E;background:#1e1008}
.slot.selected{background:#E8390E;border-color:#E8390E;color:#fff}
.slot.booked{background:#161616;border-color:#222;color:#3a3a3a;cursor:not-allowed;text-decoration:line-through}
.no-slots{font-size:12px;color:#555;font-style:italic;padding:8px 0}
.loading{color:#E8390E;font-size:13px;padding:16px 0}
.selected-info{background:#1a0d08;border:1.5px solid #E8390E;border-radius:9px;padding:12px 16px;margin:16px 0;font-size:13px;display:none;color:#ddd}
.selected-info strong{color:#E8390E}
.section-divider{border:none;border-top:1px solid #252525;margin:22px 0}
.submit-btn{width:100%;background:#E8390E;color:#fff;border:none;border-radius:9px;padding:15px;font-size:15px;font-weight:800;cursor:pointer;letter-spacing:0.3px;transition:opacity .15s;font-family:'Inter',sans-serif}
.submit-btn:hover{opacity:0.88}
.submit-btn:disabled{opacity:0.35;cursor:not-allowed}
.success-screen{display:none;text-align:center;padding:56px 24px}
.success-icon{font-size:52px;margin-bottom:20px}
.success-title{font-size:22px;font-weight:800;color:#22c97e;margin-bottom:10px}
.success-sub{color:#999;font-size:14px;line-height:1.7}
.legend{display:flex;gap:16px;margin-bottom:10px;font-size:11px;color:#666}
.legend-item{display:flex;align-items:center;gap:6px}
.legend-dot{width:10px;height:10px;border-radius:3px}
.legend-free{background:#2a2a2a;border:1px solid #444}
.legend-taken{background:#161616;border:1px solid #222}
.legend-selected{background:#E8390E}
.priority-note{font-size:11px;color:#555;margin-top:-6px;margin-bottom:16px;font-style:italic}
</style>

AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAf/Z" alt="Broken English">
  <span class="header-sub">Assessment Booking</span>
</div>

<div class="container">

  <!-- SUCCESS SCREEN -->
  <div class="success-screen" id="successScreen">
    <div class="success-icon">✅</div>
    <div class="success-title">Booking Confirmed!</div>
    <div class="success-sub" id="successMsg"></div>
    <button class="submit-btn" style="max-width:220px;margin:24px auto 0;display:block" onclick="resetForm()">Book Another</button>
  </div>

  <!-- BOOKING FORM -->
  <div id="bookingForm">

    <h2>Student Details</h2>
    <div class="form-row">
      <div>
        <label>Student Name *</label>
        <input type="text" id="studentName" placeholder="Full name">
      </div>
      <div>
        <label>WhatsApp / Contact No *</label>
        <input type="tel" id="contactNo" placeholder="e.g. 9876543210">
      </div>
    </div>
    <div class="form-row">
      <div>
        <label>Requirements</label>
        <input type="text" id="requirements" placeholder="Speaking focus, evening slot...">
      </div>
      <div>
        <label>Remarks</label>
        <input type="text" id="remarks" placeholder="Any additional notes">
      </div>
    </div>
    <div style="margin-bottom:20px">
      <label>Your Name (Counsellor) *</label>
      <select id="counsellor">
        <option value="">— Loading counsellors... —</option>
      </select>
    </div>

    <hr class="section-divider">

    <h2>Choose Date & Time Slot</h2>
    <div class="date-row">
      <label>Assessment Date *</label>
      <input type="date" id="assessDate" onchange="loadSlots()">
    </div>

    <div class="slot-section" id="slotSection">
      <div style="color:#444;font-size:13px;padding:10px 0">Select a date above to see available slots.</div>
    </div>

    <div class="selected-info" id="selectedInfo">
      Selected: <strong id="selectedLabel">—</strong> with trainer <strong id="selectedTrainer">—</strong>
    </div>

    <hr class="section-divider">
    <button class="submit-btn" id="submitBtn" onclick="submitBooking()" disabled>Confirm Booking</button>

  </div>
</div>

<script>
let selectedTrainer = null;
let selectedSlot    = null;
let selectedDate    = null;

const todayStr = new Date().toISOString().split('T')[0];
document.getElementById('assessDate').setAttribute('min', todayStr);
document.getElementById('assessDate').value = todayStr;
window.onload = () => { loadSlots(); loadCounsellors(); };

async function loadCounsellors() {
  const select = document.getElementById('counsellor');
  // Fallback list — only used if the live sheet read fails, so the booking
  // page never breaks entirely. Update the "Team" tab on the Master Sheet
  // to add/remove counsellors; this fallback does not need to be kept
  // perfectly in sync, it's a safety net only.
  const fallback = ['Ashika', 'Alisha', 'Hisana', 'Hiba', 'Diya', 'Sumayya'];
  let names = fallback;
  try {
    const resp = await fetch('/api/counsellors');
    const data = await resp.json();
    if (Array.isArray(data.counsellors) && data.counsellors.length > 0) {
      names = data.counsellors;
    }
  } catch (e) {
    console.error('Could not load counsellors live, using fallback list:', e.message);
  }
  select.innerHTML = '<option value="">— Select your name —</option>' +
    names.map(n => `<option value="${n}">${n}</option>`).join('');
}

async function loadSlots() {
  const date = document.getElementById('assessDate').value;
  if (!date) return;
  selectedDate    = date;
  selectedTrainer = null;
  selectedSlot    = null;
  updateSelectedInfo();
  const section = document.getElementById('slotSection');
  section.innerHTML = '<div class="loading">Loading available slots...</div>';
  try {
    const resp = await fetch('/api/slots?date=' + date);
    const data = await resp.json();
    renderSlots(data);
  } catch(e) {
    section.innerHTML = '<div style="color:#e24b4a;font-size:13px">Could not load slots. Please refresh.</div>';
  }
}

function renderSlots(data) {
  const section = document.getElementById('slotSection');
  // Trainer list and order now come entirely from the server's response
  // (which itself reads the "Assessment trainers' schedule" sheet live) —
  // no hardcoded names here anymore, so this can never go stale again when
  // a trainer is added or removed from the sheet.
  const trainerOrder  = Object.keys(data.slots || {});
  const ordinals       = ['1st','2nd','3rd','4th','5th','6th','7th','8th'];
  let html = '<div class="legend"><div class="legend-item"><div class="legend-dot legend-free"></div>Available</div><div class="legend-item"><div class="legend-dot legend-taken"></div>Already booked</div><div class="legend-item"><div class="legend-dot legend-selected"></div>Your selection</div></div>';
  html += '<p class="priority-note">Trainer priority order — Josephine receives assessments first.</p>';
  let hasAny = false;
  for (let i = 0; i < trainerOrder.length; i++) {
    const trainer = trainerOrder[i];
    const slots   = data.slots[trainer] || [];
    if (!slots.length) continue;
    hasAny = true;
    const priorityLabel = ordinals[i] || (i + 1) + 'th';
    html += `<div class="trainer-block"><div class="trainer-name">${trainer} <span class="trainer-badge">${priorityLabel} priority</span></div><div class="slots-grid">`;
    for (const slot of slots) {
      const cls   = slot.booked ? 'slot booked' : 'slot';
      const click = slot.booked ? '' : `onclick="selectSlot('${trainer}',${slot.startMin},'${slot.label}')"`;
      html += `<div class="${cls}" id="slot-${trainer}-${slot.startMin}" ${click}>${slot.label}</div>`;
    }
    html += '</div></div>';
  }
  if (!hasAny) html += '<div class="no-slots">No assessment slots available on this day.</div>';
  section.innerHTML = html;
}

function selectSlot(trainer, startMin, label) {
  if (selectedTrainer && selectedSlot !== null) {
    const prev = document.getElementById('slot-' + selectedTrainer + '-' + selectedSlot);
    if (prev) prev.classList.remove('selected');
  }
  selectedTrainer = trainer;
  selectedSlot    = startMin;
  const el = document.getElementById('slot-' + trainer + '-' + startMin);
  if (el) el.classList.add('selected');
  updateSelectedInfo();
}

function updateSelectedInfo() {
  const info = document.getElementById('selectedInfo');
  const btn  = document.getElementById('submitBtn');
  if (selectedTrainer && selectedSlot !== null) {
    document.getElementById('selectedLabel').textContent   = formatMin(selectedSlot);
    document.getElementById('selectedTrainer').textContent = selectedTrainer;
    info.style.display = 'block';
    btn.disabled = false;
  } else {
    info.style.display = 'none';
    btn.disabled = true;
  }
}

function formatMin(min) {
  const h = Math.floor(min/60), m = min%60;
  const ap = h>=12?'PM':'AM', h12 = h>12?h-12:(h===0?12:h);
  return h12+':'+(m+'').padStart(2,'0')+' '+ap;
}

async function submitBooking() {
  const studentName  = document.getElementById('studentName').value.trim();
  const contactNo    = document.getElementById('contactNo').value.trim();
  const counsellor   = document.getElementById('counsellor').value;
  const requirements = document.getElementById('requirements').value.trim();
  const remarks      = document.getElementById('remarks').value.trim();

  if (!studentName) { alert('Please enter the student name.'); return; }
  if (!contactNo)   { alert('Please enter the contact number.'); return; }
  if (!counsellor)  { alert('Please select your name.'); return; }
  if (!selectedDate || selectedSlot === null) { alert('Please select a date and time slot.'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Submitting...';

  const hours   = Math.floor(selectedSlot/60);
  const minutes = selectedSlot%60;

  const formData = new FormData();
  formData.append('entry.1358083565', studentName);
  formData.append('entry.711228167',  contactNo);
  formData.append('entry.88497250',   selectedDate);
  formData.append('entry.1717503294_hour',   hours.toString());
  formData.append('entry.1717503294_minute', minutes.toString().padStart(2,'0'));
  formData.append('entry.679280233',  counsellor);
  formData.append('entry.679286440',  requirements||'N/A');
  formData.append('entry.1754050611', remarks||'N/A');

  try {
    await fetch('https://docs.google.com/forms/d/e/1FAIpQLSfZihO1EylQqqiLX6tvNSF6j7knESlCeQ4EkHMNwcd_Kk9iAg/formResponse', { method:'POST', mode:'no-cors', body:formData });
    document.getElementById('bookingForm').style.display = 'none';
    document.getElementById('successScreen').style.display = 'block';
    document.getElementById('successMsg').innerHTML =
      '<b style="color:#f0f0f0">' + studentName + '</b> booked at <b style="color:#E8390E">' +
      formatMin(selectedSlot) + '</b> on <b style="color:#E8390E">' + selectedDate + '</b>.<br><br>' +
      selectedTrainer + ' has been automatically notified by email.<br>You will receive a confirmation email shortly.';
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'Confirm Booking';
    alert('Submission failed. Please try again.');
  }
}

function resetForm() {
  document.getElementById('bookingForm').style.display = 'block';
  document.getElementById('successScreen').style.display = 'none';
  ['studentName','contactNo','requirements','remarks'].forEach(id => document.getElementById(id).value='');
  document.getElementById('counsellor').value = '';
  selectedTrainer = selectedSlot = null;
  loadSlots();
}
</script>
</body>
</html>
